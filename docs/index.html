<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Godot Game Portal</title>
    <!-- สคริปต์แก้บั๊กโหลดค้างของ Godot 4 -->
    <script src="coi-serviceworker.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #111119 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px rgba(255, 255, 255, 0.05) solid;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #478cbf, #64b5f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            color: #8a8a9e;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        li {
            width: 100%;
            max-width: 300px;
        }

        /* ตกแต่งปุ่มเลือกเกม */
        .game-btn {
            display: block;
            width: 100%;
            padding: 16px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: linear-gradient(135deg, #478cbf 0%, #356a93 100%);
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(71, 140, 191, 0.3);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        /* เอฟเฟกต์ตอนเอาเมาส์ไปชี้ (Hover) */
        .game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(71, 140, 191, 0.5);
            background: linear-gradient(135deg, #579cd1 0%, #478cbf 100%);
            letter-spacing: 1px;
        }

        /* เอฟเฟกต์ตอนกดคลิก */
        .game-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(71, 140, 191, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Game Project</h1>
        <p>ยินดีต้อนรับเข้าสู่เว็บรวมโปรเจกต์เกม Godot</p>
        
    <div class="game-container"> <ul class="game-list">
        <li>
            <a href="lab01.html" class="game-btn">🕹️ เล่นเกม Lab 01</a>
        </li>
        <li>
            <a href="game21.html" class="game-btn">🕹️ เล่นเกม Game 21</a> </li>
    </ul>
</div>
</body>
</html>
